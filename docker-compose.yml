version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
        DATABASE_URL: postgresql://postgres:kaushik@postgres:5432/paynest
        REDIS_URL: redis://redis:6379
        JWT_SECRET: change-this-to-a-long-random-string-in-production
        NEXT_PUBLIC_APP_URL: http://localhost:3000
      
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kaushik
      POSTGRES_DB: paynest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis: 
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
